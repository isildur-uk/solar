<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registry</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="marking-banner" class="marking-banner" data-mk="OFFICIAL">OFFICIAL</div>

<header class="masthead">
  <a class="brand" href="../hero.html" title="SOLAR home">REGISTRY</a>
  <label class="visually-hidden" for="search">Search reports</label>
  <input id="search" class="search masthead-search" type="text" placeholder="Search title, URN, source, text&hellip;" autocomplete="off">
  <button id="btn-new" class="btn masthead-new" type="button">+ New report</button>
</header>

<main class="main" id="main" aria-live="polite"></main>

<div id="statusline" class="statusline" role="status" aria-live="polite" hidden></div>

<!-- Single source of truth: SOLAR's data-standards layer (load first) -->
<script src="../js/core/cm-vocab.js"></script>
<script src="../js/core/cm-standards.js"></script>
<!-- Registry core -->
<script src="core/grading.js"></script>
<script src="core/threat-areas.js"></script>
<script src="core/operations.js"></script>
<script src="core/ir-model.js"></script>
<script src="core/ir-validate.js"></script>
<script src="core/normalise.js"></script>
<script src="core/repository.js"></script>
<script src="core/si-model.js"></script>
<script src="core/matching.js"></script>
<script src="core/workflow.js"></script>
<script src="core/deletion.js"></script>
<script src="core/handoff.js"></script>
<script src="core/repository-sqlite.js"></script>
<script src="core/sqlite-driver-tauri.js"></script>
<script src="core/demo-seed.js"></script>
<script src="core/query.js"></script>
<!-- SOLAR's vendored graph library (offline, no CDN) for the inline mini chart.
     app.js feature-detects window.vis and skips rendering if absent (Node/jsdom). -->
<script src="../js/lib/vis-network.min.js"></script>
<!-- App -->
<script src="app.js"></script>
</body>
</html>
