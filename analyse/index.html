<!DOCTYPE html>
<html lang="en-GB">
<head>
<script>(function(){try{var t=localStorage.getItem("solar_theme")||"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analyse — SOLAR</title>
<link rel="stylesheet" href="../css/lib/leaflet.css?v=20260718a">
<!-- Full workbench design-system stack (parity with charting/database): tokens, palette, polish, chrome. -->
<link rel="stylesheet" href="../css/app.css?v=20260716b">
<link rel="stylesheet" href="../css/tokens.css?v=20260716a">
<link rel="stylesheet" href="../css/mobile.css?v=20260716a">
<link rel="stylesheet" href="../css/enhance.css?v=20260716a">
<link rel="stylesheet" href="../css/redesign.css?v=20260716a">
<link rel="stylesheet" href="../css/shell.css?v=20260716a">
<style>
  /* Structural only — all colour/type comes from the design tokens above. */
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;background:var(--bg)}
  /* Chrome sits above the fixed cosmic ground (js/ui/cosmos.js, z-index:0). */
  .marking-banner,header.masthead,.analyse-main{position:relative;z-index:1}
  .analyse-main{flex:1;min-height:0;display:flex;flex-direction:column}
  .tool-switch{display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line)}
  .tool-host{flex:1;min-height:0;display:flex}
  .tool-host[hidden]{display:none}
  .tool-host > *{flex:1;min-height:0}
</style>
</head>
<body>
<header class="masthead">
  <a class="brand" href="../hero.html" title="SOLAR home">SOLAR</a>
  <nav class="masthead-nav">
    <a class="btn" href="/database" title="Intelligence database">Database</a>
    <a class="btn" href="/charting" title="Link chart">Charting</a>
    <a class="btn btn-on" href="/analyse" aria-current="page" title="Analytical tools">Analyse</a>
    <a class="btn" href="/context" title="Strategic threat-area maps">Context</a>
  </nav>
  <span class="masthead-spacer" style="flex:1"></span>
  <span class="masthead-user" title="Analytical workspace">Analyse</span>
</header>

<main class="analyse-main" id="analyse-main" aria-live="polite">
  <div class="tool-switch" id="tool-switch">
    <button class="btn btn-on" type="button" data-tool="cdr">CDR viewer</button>
    <button class="btn" type="button" data-tool="link">Cross-file analysis</button>
    <button class="btn" type="button" data-tool="nbtc">Border / NBTC</button>
  </div>
  <div class="tool-host" id="tool-cdr"></div>
  <div class="tool-host" id="tool-link" hidden></div>
  <div class="tool-host" id="tool-nbtc" hidden></div>
</main>

<!-- Data-standards layer (load first) -->
<script src="../js/core/cm-vocab.js?v=20260718a"></script>
<script src="../js/core/cm-standards.js?v=20260718a"></script>
<!-- Comms-data CORE (parse / de-bloat / offline BNG->WGS84) + cross-file analysis -->
<script src="../js/core/comms-data.js?v=20260718a"></script>
<script src="../js/core/comms-link.js?v=20260718a"></script>
<script src="../js/core/comms-network.js?v=20260718a"></script>
<script src="../js/core/comms-pattern.js?v=20260718a"></script>
<script src="../js/core/comms-journeys.js?v=20260718a"></script>
<script src="../js/core/comms-contacts.js?v=20260718a"></script>
<script src="../js/core/comms-attribution.js?v=20260718a"></script>
<!-- Shared case spine + Analyse->case bridge -->
<script src="../js/core/solar-case.js?v=20260718a"></script>
<script src="../js/core/comms-case.js?v=20260718a"></script>
<!-- Border / NBTC: vendored aviation reference + passenger identity resolution -->
<script src="../js/core/aviation-ref.js?v=20260718a"></script>
<script src="../js/core/country-flags.js?v=20260718a"></script>
<script src="../js/core/nbtc.js?v=20260718a"></script>
<!-- Shared identity + shared shell top bar (one product, three functions) -->
<script src="../js/ui/identity.js?v=20260718a"></script>
<script src="./shell-lite.js?v=20260718a"></script>
<!-- Registry-parity ambient cosmic ground (fixed layer behind the chrome) -->
<script src="../js/ui/cosmos.js?v=20260718a"></script>
<!-- Vendored libs (offline, no CDN except the Leaflet basemap tiles) -->
<script src="../js/lib/leaflet.js?v=20260718a"></script>
<script src="../js/lib/vis-network.min.js"></script>
<script src="../js/lib/xlsx.full.min.js?v=20260718a"></script>
<!-- Shared entity look: same node glyphs + hue scheme as Charting (CRIcons) -->
<script src="../js/ui/icons.js?v=20260718a"></script>
<script src="../js/ui/entity-style.js?v=20260718a"></script>
<script src="../js/core/known-entities.js?v=20260718a"></script>
<!-- Analyse views -->
<script src="./comms-view.js?v=20260718a"></script>
<script src="./comms-link-view.js?v=20260718a"></script>
<script src="./nbtc-view.js?v=20260718a"></script>
<script>
  (function(){
    function boot(){
      var u = document.querySelector(".masthead-user");
      if (u && window.SolarIdentity) { u.textContent = window.SolarIdentity.label(); u.title = "Your identity (shared across SOLAR)"; }
      var cdr = document.getElementById("tool-cdr"), link = document.getElementById("tool-link"), nbtc = document.getElementById("tool-nbtc");
      if (cdr && window.RegistryCommsView) window.RegistryCommsView.mount(cdr);
      if (link && window.RegistryCommsLinkView) window.RegistryCommsLinkView.mount(link);
      if (nbtc && window.RegistryNbtcView) window.RegistryNbtcView.mount(nbtc);
      var sw = document.getElementById("tool-switch");
      var hosts = { cdr: cdr, link: link, nbtc: nbtc };
      if (sw) sw.addEventListener("click", function(e){
        var b = e.target && e.target.closest ? e.target.closest("[data-tool]") : null; if (!b) return;
        var tool = b.getAttribute("data-tool");
        [].forEach.call(sw.querySelectorAll(".btn"), function(x){ x.classList.toggle("btn-on", x === b); });
        Object.keys(hosts).forEach(function(k){ if (hosts[k]) hosts[k].toggleAttribute("hidden", k !== tool); });
        if (tool === "link" && window.RegistryCommsLinkView && window.RegistryCommsLinkView.refresh) window.RegistryCommsLinkView.refresh();
      });
    }
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot); else boot();
  })();
</script>
</body>
</html>
