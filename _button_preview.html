<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLAR toolbar — liquid-glass button preview</title>
<style>
  :root{
    --bg:#0c0c0b; --panel:#131311; --line:#2a2a27; --text:#f4f3e8; --dim:#a3a299;
    --accent:#ebfc72; --accent-dim:#bacd31; --bad:#d86a6a; --radius:4px;
    --mono:"Geist Mono","Cascadia Mono",ui-monospace,Consolas,monospace;
    --sans:"Inter","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);padding:34px}
  h2{font:600 12px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:0 0 12px}
  .bar{display:flex;gap:10px;align-items:center;background:rgba(14,14,12,0.96);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:34px}
  .note{color:var(--dim);font-size:12px;margin:-24px 0 30px}
  button,.pillbtn{font:600 13px var(--sans);letter-spacing:.01em;color:var(--text);padding:8px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .caret{font-size:10px;opacity:.7}

  /* ---------- BEFORE: the current heavy-bevel version ---------- */
  .before .b{
    position:relative;isolation:isolate;overflow:hidden;border-radius:10px;color:var(--text);
    background:rgba(244,243,232,0.05);border:1px solid rgba(244,243,232,0.12);
    text-shadow:0 1px 6px rgba(0,0,0,0.45);
    box-shadow:0 2px 8px rgba(0,0,0,0.20),
      inset 2px 2px 0.4px -2.5px rgba(255,255,255,0.60), inset -2px -2px 0.4px -2.5px rgba(255,255,255,0.55),
      inset 1px 1px 1px -0.5px rgba(255,255,255,0.45), inset -1px -1px 1px -0.5px rgba(255,255,255,0.45),
      inset 0 0 5px 5px rgba(255,255,255,0.05), inset 0 0 2px 2px rgba(255,255,255,0.04);
  }
  .before .b.primary{color:var(--accent);border-color:rgba(235,252,114,0.42);background:rgba(235,252,114,0.07)}

  /* ---------- AFTER: refined liquid glass (what is now shipped) ---------- */
  .after .b{
    position:relative;isolation:isolate;overflow:hidden;border-radius:9px;color:var(--text);
    border:1px solid rgba(244,243,232,0.16);text-shadow:0 1px 2px rgba(0,0,0,0.55);
    background:linear-gradient(180deg,rgba(255,255,255,0.10) 0%,rgba(255,255,255,0.018) 46%,rgba(0,0,0,0.12) 100%),rgba(28,29,25,0.66);
    -webkit-backdrop-filter:blur(10px) saturate(1.15);backdrop-filter:blur(10px) saturate(1.15);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.14),inset 0 -1px 0 rgba(0,0,0,0.28),0 2px 6px rgba(0,0,0,0.38);
    transition:color .18s,border-color .18s,background-color .18s,box-shadow .2s,transform .16s;
  }
  .after .b::before{content:"";position:absolute;left:1px;right:1px;top:1px;height:46%;z-index:-1;pointer-events:none;
    border-radius:8px 8px 42%/8px 8px 14px;background:linear-gradient(180deg,rgba(255,255,255,0.18),rgba(255,255,255,0) 100%)}
  .after .b:hover{color:var(--accent);border-color:var(--accent-dim);transform:translateY(-1px);
    background:linear-gradient(180deg,rgba(235,252,114,0.16) 0%,rgba(235,252,114,0.03) 48%,rgba(0,0,0,0.10) 100%),rgba(33,35,22,0.68);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.20),inset 0 -1px 0 rgba(0,0,0,0.26),0 5px 14px rgba(0,0,0,0.42),0 0 18px -8px var(--accent)}
  .after .b:active{transform:translateY(0) scale(0.985);box-shadow:inset 0 2px 5px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.05),0 1px 2px rgba(0,0,0,0.3)}
  .after .b:focus-visible{outline:none;box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--accent),inset 0 1px 0 rgba(255,255,255,0.16)}
  .after .b.primary{color:var(--accent);border-color:rgba(235,252,114,0.55);
    background:linear-gradient(180deg,rgba(235,252,114,0.22) 0%,rgba(235,252,114,0.05) 50%,rgba(0,0,0,0.08) 100%),rgba(34,36,22,0.62)}
  .after .b.primary::before{background:linear-gradient(180deg,rgba(235,252,114,0.34),rgba(255,255,255,0) 100%)}
  .after .b.primary:hover{border-color:var(--accent);
    background:linear-gradient(180deg,rgba(235,252,114,0.30) 0%,rgba(235,252,114,0.08) 52%,rgba(0,0,0,0.08) 100%),rgba(38,40,24,0.66);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),0 5px 14px rgba(0,0,0,0.42),0 0 22px -6px var(--accent)}
</style>
</head>
<body>
  <p style="color:var(--dim);font-size:12px;margin:0 0 26px">Hover the buttons. Top row = before, bottom row = the shipped refined glass. Both on the real console bar colour.</p>

  <div class="before">
    <h2>Before</h2>
    <div class="bar">
      <button class="b primary">ADD <span class="caret">▾</span></button>
      <button class="b">CASE <span class="caret">▾</span></button>
      <button class="b">LOGS</button>
      <button class="b">DATABASE</button>
      <button class="b">TOOLS <span class="caret">▾</span></button>
      <button class="b">UNDO</button>
    </div>
  </div>

  <div class="after">
    <h2>After — refined liquid glass</h2>
    <div class="bar">
      <button class="b primary">ADD <span class="caret">▾</span></button>
      <button class="b">CASE <span class="caret">▾</span></button>
      <button class="b">LOGS</button>
      <button class="b">DATABASE</button>
      <button class="b">TOOLS <span class="caret">▾</span></button>
      <button class="b">UNDO</button>
    </div>
  </div>
</body>
</html>
